name: publish telemetry

# Reads the flagship coordinator account on a schedule and pushes real telemetry
# into the leviathan-web dashboard. leviathan-indexer is libtorch-free, so this
# stays cheap. leviathan-net is private and leviathan-web is public, so the job
# builds the indexer here and cross-pushes the result to the site's public/.
#
# Required configuration on this repo:
#   secret   TELEMETRY_RPC        a dedicated devnet RPC url
#   secret   LEVIATHAN_WEB_TOKEN  a token with contents:write on wienerlabs/leviathan-web
#   variable COORDINATOR_ACCOUNT  the run's coordinator account pubkey
#   variable RUN_ID               the run id (default leviathan-devnet)
# Optional economics for the security verdict:
#   variable REWARD_PER_ROUND, BOND, SLASH_WHEN_CAUGHT

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

concurrency:
  group: publish-telemetry
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: '. -> target'

      - name: Build the indexer
        run: cargo build -p leviathan-indexer --features live --bin leviathan-indexer

      - name: Read telemetry
        env:
          RPC: ${{ secrets.TELEMETRY_RPC }}
          COORDINATOR_ACCOUNT: ${{ vars.COORDINATOR_ACCOUNT }}
          RUN_ID: ${{ vars.RUN_ID }}
          REWARD_PER_ROUND: ${{ vars.REWARD_PER_ROUND }}
          BOND: ${{ vars.BOND }}
          SLASH_WHEN_CAUGHT: ${{ vars.SLASH_WHEN_CAUGHT }}
        run: |
          if [[ -z "$COORDINATOR_ACCOUNT" || -z "$RPC" ]]; then
            echo "COORDINATOR_ACCOUNT variable and TELEMETRY_RPC secret are required"
            exit 1
          fi
          args=(--coordinator-account "$COORDINATOR_ACCOUNT" --run-id "${RUN_ID:-leviathan-devnet}" --rpc "$RPC")
          if [[ -n "$REWARD_PER_ROUND" && -n "$BOND" && -n "$SLASH_WHEN_CAUGHT" ]]; then
            args+=(--reward-per-round "$REWARD_PER_ROUND" --bond "$BOND" --slash-when-caught "$SLASH_WHEN_CAUGHT")
          fi
          OUT=telemetry.json ./scripts/publish-telemetry.sh "${args[@]}"
          echo "----- telemetry -----"
          cat telemetry.json

      - name: Push telemetry to leviathan-web
        env:
          TOKEN: ${{ secrets.LEVIATHAN_WEB_TOKEN }}
        run: |
          if [[ -z "$TOKEN" ]]; then
            echo "LEVIATHAN_WEB_TOKEN secret is required to publish the dashboard telemetry"
            exit 1
          fi
          git clone --depth 1 "https://x-access-token:${TOKEN}@github.com/wienerlabs/leviathan-web.git" web
          cp telemetry.json web/public/telemetry.json
          cd web
          if git diff --quiet -- public/telemetry.json; then
            echo "telemetry unchanged"
            exit 0
          fi
          git config user.name "leviathan-telemetry"
          git config user.email "telemetry@wienerlabs.noreply"
          git add public/telemetry.json
          git commit -m "chore(telemetry): refresh dashboard telemetry"
          git push
